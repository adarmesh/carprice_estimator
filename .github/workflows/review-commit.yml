name: Hello World

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  review-commit:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Analyse commit
        timeout-minutes: 5
        run: |
          claude -p "Analyse the changes in this pushed commit for security issues, error handling gaps, and test coverage. Write the findings to review.json as JSON matching: {\"findings\": [{\"file\": \"...\", \"line\": 0, \"severity\": \"...\", \"message\": \"...\"}]}" \
            --allowedTools Write \
            --output-format json > review.json
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review
          path: review.json
      - name: Post review as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(cat review.json)"
