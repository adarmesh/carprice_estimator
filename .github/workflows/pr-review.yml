name: PR review (diff only)

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  review-commit:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Generate diff
        run: git diff origin/${{ github.base_ref }}..HEAD > diff.patch
      - name: Analyse commit
        timeout-minutes: 5
        run: |
          claude -p "Analyse only the lines in diff.patch for security issues, error handling gaps, and test coverage. Output ONLY the raw rdjson object following the schema in CLAUDE.md. No explanation, no summary, no markdown — just the JSON. Do NOT wrap the JSON in markdown. Wrong: \`\`\`json {...} \`\`\`. Correct: {...}" \
            --output-format json | jq -r '.result' > review.json
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review
          path: |
            review.json
            diff.patch
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
      - name: Post review as PR comment
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat review.json | reviewdog -f rdjson -reporter=github-pr-review
