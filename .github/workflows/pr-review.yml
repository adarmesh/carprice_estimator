name: Hello World

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  review-commit:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Analyse commit
        timeout-minutes: 5
        run: |
          claude -p "Analyse only the lines in diff.patch for security issues, error handling gaps, and test coverage. Write findings to review.json following the schema in CLAUDE.md." \
            --allowedTools Write \
            --output-format json > /dev/null
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review
          path: review.json
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
      - name: Post review as PR comment
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat review.json | reviewdog -f rdjson -reporter=github-pr-review
